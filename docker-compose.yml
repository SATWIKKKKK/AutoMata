version: '3.8'

services:
  # Database Layer
  postgres:
    image: timescale/timescaledb-ha:pg16
    environment:
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=orren
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - orren-net

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    networks:
      - orren-net

  # Temporal Orchestration
  temporal:
    image: temporalio/admin-tools:1.22.0
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    depends_on:
      - postgres
    networks:
      - orren-net

  # Backend API (FastAPI)
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - orren-net

  # Temporal Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    depends_on:
      - api
    networks:
      - orren-net

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    env_file: .env
    networks:
      - orren-net

networks:
  orren-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
