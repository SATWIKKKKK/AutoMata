name: Production CI/CD

on:
  push:
    branches: [ main ]

jobs:
  test_and_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run Pytest
        run: |
          pip install -r requirements.txt pytest httpx
          pytest tests/

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Images
        run: |
          docker build -t ghcr.io/${{ github.repository }}/api:latest -f Dockerfile.api .
          docker build -t ghcr.io/${{ github.repository }}/worker:latest -f Dockerfile.worker .
          docker build -t ghcr.io/${{ github.repository }}/frontend:latest -f Dockerfile .
          docker push ghcr.io/${{ github.repository }}/api:latest
          docker push ghcr.io/${{ github.repository }}/worker:latest
          docker push ghcr.io/${{ github.repository }}/frontend:latest

  deploy:
    needs: test_and_build
    runs-on: ubuntu-latest
    steps:
      - name: SSH Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            cd /opt/orren-platform
            docker compose pull
            docker compose up -d
